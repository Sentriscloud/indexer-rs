[package]
name = "indexer-bin"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true

[[bin]]
name = "indexer"
path = "indexer.rs"

[[bin]]
name = "api"
path = "api.rs"

[dependencies]
indexer-domain = { path = "../crates/domain", version = "0.2.3" }
indexer-db = { path = "../crates/db", version = "0.2.3" }
indexer-chain = { path = "../crates/chain", version = "0.2.3" }
indexer-sync = { path = "../crates/sync", version = "0.2.3" }
indexer-coinblast = { path = "../crates/coinblast", version = "0.2.3" }
indexer-analytics = { path = "../crates/analytics", version = "0.2.3" }
indexer-api = { path = "../crates/api", version = "0.2.3" }
indexer-cache = { path = "../crates/cache", version = "0.2.3" }

clickhouse.workspace = true

# Runtime + signals.
tokio = { workspace = true, features = ["full"] }
tokio-util = { workspace = true, features = ["rt"] }
futures.workspace = true

# HTTP server bind.
axum.workspace = true
tower-http = { workspace = true, features = ["cors", "trace", "timeout"] }

# Config (env-driven).
figment = { workspace = true, features = ["env", "toml"] }
serde = { workspace = true, features = ["derive"] }

# Errors + logging.
anyhow.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
