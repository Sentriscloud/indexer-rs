name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  SQLX_OFFLINE: "true"

jobs:
  build:
    name: build + test + clippy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (from rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy

      - name: Install protoc (tonic-build dep)
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c1bb0f4b27f48d8eaf4196af0fc6fc # v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo build (workspace)
        run: cargo build --workspace --locked

      - name: cargo nextest
        uses: taiki-e/install-action@da71d5095c1b85ef82a01c43e83fa99ddec7c7a4 # nextest
      - run: cargo nextest run --workspace --locked --no-tests=pass

      - name: cargo clippy -D warnings
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  deny:
    name: cargo-deny (licenses + advisories)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@6c8f9facfa50f193b0d8d6c6f4a05aa3f1b7c8c0 # v2
        with:
          command: check
          arguments: --all-features
