name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  SQLX_OFFLINE: "true"

jobs:
  build:
    name: build + test + clippy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Rust toolchain (from rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy

      - name: Install protoc (tonic-build dep)
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo build (workspace)
        run: cargo build --workspace --locked

      - name: cargo nextest
        uses: taiki-e/install-action@da71d5095c1b175e60393b8d36727208ae905210 # nextest
      - run: cargo nextest run --workspace --locked --no-tests=pass

      - name: cargo clippy -D warnings
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  deny:
    name: cargo-deny (licenses + advisories)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
        with:
          command: check
          arguments: --all-features
