# Local-dev / single-host production stack.
#
# Operator brings DATABASE_URL + RPC_URL via env_file `./compose.env` (gitignored).
# Example compose.env:
#
#   DATABASE_URL=postgres://indexer:indexer@postgres:5432/indexer
#   RPC_URL=https://rpc.sentrixchain.com
#   GRPC_URL=https://grpc.sentrixchain.com:443
#   INDEXER_NETWORK=mainnet

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: indexer
      POSTGRES_PASSWORD: indexer
      POSTGRES_DB: indexer
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U indexer -d indexer"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "127.0.0.1:5432:5432"

  indexer:
    build:
      context: .
      dockerfile: Dockerfile
    image: sentrix/indexer-rs:latest
    restart: unless-stopped
    env_file:
      - ./compose.env
    command: ["/usr/local/bin/indexer"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # `pgrep` isn't in debian-bookworm-slim, and adding procps just for a
      # healthcheck is wasted bytes. `/proc/1/comm` always exists in Linux
      # and the binary runs as PID 1 (no shell wrapper).
      test: ["CMD-SHELL", "[ \"$$(cat /proc/1/comm)\" = indexer ]"]
      interval: 30s
      timeout: 5s
      retries: 5

  api:
    image: sentrix/indexer-rs:latest
    restart: unless-stopped
    env_file:
      - ./compose.env
    environment:
      INDEXER_API_BIND: 0.0.0.0:8080
    command: ["/usr/local/bin/api"]
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      # Same swap as the indexer healthcheck above — `wget` isn't in
      # debian-bookworm-slim, so the previous wget-based probe always
      # exited 1 and showed the container as `(unhealthy)` even when
      # /health was serving 200 normally. /proc/1/comm matches "api"
      # because the binary runs directly as PID 1 (no shell wrapper).
      test: ["CMD-SHELL", "[ \"$$(cat /proc/1/comm)\" = api ]"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  pg_data:
